<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" fill="none">
  <defs>
    <linearGradient id="bGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#166534"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- ── B letterform (thick stroke outline, square left corners) ── -->
  <!-- Left vertical bar -->
  <line x1="42" y1="28" x2="42" y2="232"
        stroke="url(#bGrad)" stroke-width="13" stroke-linecap="square"/>
  <!-- Top horizontal bar -->
  <line x1="42" y1="28" x2="128" y2="28"
        stroke="url(#bGrad)" stroke-width="13" stroke-linecap="square"/>
  <!-- Bottom horizontal bar -->
  <line x1="42" y1="232" x2="138" y2="232"
        stroke="url(#bGrad)" stroke-width="13" stroke-linecap="square"/>
  <!-- Middle bar -->
  <line x1="42" y1="130" x2="112" y2="130"
        stroke="url(#bGrad)" stroke-width="13" stroke-linecap="butt"/>
  <!-- Upper lobe (smaller D-curve) -->
  <path d="M 128 28 C 196 28 196 130 112 130"
        stroke="url(#bGrad)" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Lower lobe (larger D-curve) -->
  <path d="M 112 130 C 210 130 210 232 138 232"
        stroke="url(#bGrad)" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- ── Leaf (centred across the middle, slightly tilted) ── -->
  <ellipse cx="148" cy="162" rx="62" ry="37"
           stroke="url(#leafGrad)" stroke-width="6.5" fill="none"
           transform="rotate(-13 148 162)"/>
  <!-- Midrib -->
  <line x1="88" y1="174" x2="208" y2="150"
        stroke="url(#leafGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Upper veins -->
  <line x1="108" y1="170" x2="104" y2="156" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="124" y1="167" x2="121" y2="152" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="142" y1="163" x2="140" y2="148" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="160" y1="160" x2="159" y2="146" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="178" y1="157" x2="178" y2="144" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Lower veins -->
  <line x1="108" y1="170" x2="105" y2="184" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="124" y1="167" x2="122" y2="181" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="142" y1="163" x2="141" y2="177" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="160" y1="160" x2="160" y2="173" stroke="url(#leafGrad)" stroke-width="2.8" stroke-linecap="round"/>
</svg>
